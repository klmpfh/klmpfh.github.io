<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Mermaid-Diagramm-Editor mit Live-Vorschau, Syntax-Highlighting und Fehlerkonsole.">
<title>Mermaid Editor</title>
<link rel="icon" href="../assets/img/favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="../assets/css/reset.css">
<link rel="stylesheet" href="../assets/css/theme.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/neat.min.css">
<style>
    :root {
        --accent: var(--theme-accent);
        --accent-dark: var(--theme-accent-strong);
        --panel-bg: var(--theme-surface);
        --console-bg: var(--theme-surface-muted);
        --border: var(--theme-border);
        --error: var(--theme-danger);
    }

    body {
        min-height: 100vh;
        padding-top: var(--theme-nav-height);
        display: flex;
        flex-direction: column;
    }

    header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 10px;
        padding: 12px 18px;
        background: var(--panel-bg);
        border-bottom: 1px solid var(--border);
    }

    .brand {
        display: flex;
        align-items: center;
        gap: 14px;
    }

    .controls a {
        color: var(--theme-text-muted);
        text-decoration: none;
        font-size: 0.85rem;
    }

    .controls a:hover {
        color: var(--accent);
    }

    header h1 {
        font-size: 1.1rem;
        letter-spacing: 0.5px;
    }

    .controls {
        display: flex;
        align-items: center;
        gap: 8px;
    }

    select, button {
        font-family: inherit;
        font-size: 0.82rem;
        background: var(--theme-surface-muted);
        color: var(--theme-text);
        border: 1px solid var(--border);
        border-radius: 5px;
        padding: 7px 10px;
        cursor: pointer;
    }

    select:hover, button:hover:not(:disabled) {
        border-color: var(--accent);
        color: var(--theme-text-strong);
    }

    button.primary {
        background: var(--accent-dark);
        color: #fff;
        font-weight: bold;
        border-color: var(--accent-dark);
    }

    button.primary:hover:not(:disabled) {
        background: var(--accent);
        border-color: var(--accent);
    }

    button:disabled {
        opacity: 0.4;
        cursor: not-allowed;
    }

    .main {
        flex: 1;
        min-height: 520px;
        display: grid;
        grid-template-columns: 1fr 6px 1fr;
    }

    .pane {
        display: flex;
        flex-direction: column;
        min-width: 0;
        min-height: 0;
    }

    .pane-left {
        border-right: none;
    }

    .editor-wrap {
        flex: 1;
        min-height: 0;
    }

    .editor-wrap .CodeMirror {
        height: 100%;
        font-family: var(--theme-font-mono);
        font-size: 14px;
    }

    .console {
        height: 110px;
        flex-shrink: 0;
        background: var(--console-bg);
        border-top: 1px solid var(--border);
        color: var(--theme-success);
        font-family: var(--theme-font-mono);
        font-size: 0.78rem;
        line-height: 1.5;
        padding: 8px 12px;
        overflow-y: auto;
        white-space: pre-wrap;
        word-break: break-word;
    }

    .console.has-error {
        color: var(--error);
    }

    .console .placeholder {
        color: var(--theme-text-muted);
    }

    .divider {
        background: var(--border);
        cursor: col-resize;
        position: relative;
    }

    .divider:hover, .divider.dragging {
        background: var(--accent);
    }

    .pane-right {
        background: var(--theme-gray-150);
    }

    .diagram-scroll {
        flex: 1;
        overflow: auto;
        display: flex;
        align-items: flex-start;
        justify-content: center;
        padding: 20px;
    }

    .diagram-scroll svg {
        max-width: 100%;
        height: auto;
    }

    /* ---------- Browser Speicher ---------- */
    .storage-panel {
        border-bottom: 1px solid var(--border);
        padding: 10px 12px;
        flex-shrink: 0;
    }

    .storage-toggle {
        display: flex;
        align-items: center;
        gap: 6px;
        width: 100%;
        background: none;
        border: none;
        padding: 0;
        margin-bottom: 8px;
        font-family: inherit;
        font-size: 0.78rem;
        letter-spacing: 0.5px;
        text-transform: uppercase;
        font-weight: normal;
        color: var(--theme-text-muted);
        cursor: pointer;
        text-align: left;
    }

    .storage-toggle:hover {
        color: var(--accent);
        border-color: transparent;
    }

    .storage-toggle-arrow {
        flex-shrink: 0;
        font-size: 0.7rem;
        transition: transform 0.15s ease;
    }

    .storage-panel.collapsed .storage-toggle {
        margin-bottom: 0;
    }

    .storage-panel.collapsed .storage-toggle-arrow {
        transform: rotate(-90deg);
    }

    .storage-panel.collapsed .storage-body {
        display: none;
    }

    .storage-save-row {
        display: flex;
        gap: 6px;
        margin-bottom: 8px;
    }

    .storage-save-row input[type="text"] {
        flex: 1;
        min-width: 0;
        font-family: inherit;
        font-size: 0.82rem;
        background: var(--theme-surface-muted);
        color: var(--theme-text);
        border: 1px solid var(--border);
        border-radius: 5px;
        padding: 6px 8px;
    }

    .storage-save-row input[type="text"]:focus {
        outline: none;
        border-color: var(--accent);
    }

    .storage-list {
        list-style: none;
        max-height: 110px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 4px;
    }

    .storage-list .storage-empty {
        color: var(--theme-text-muted);
        font-size: 0.78rem;
        padding: 4px 2px;
    }

    .storage-item {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 3px;
        border-radius: 4px;
        background: var(--theme-surface-muted);
    }

    .storage-item-name {
        flex: 1;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-size: 0.8rem;
        text-align: left;
        background: none;
        border: none;
        color: var(--theme-text);
        padding: 4px 6px;
    }

    .storage-item-name:hover {
        color: var(--accent);
        border-color: transparent;
    }

    .storage-item-delete {
        flex-shrink: 0;
        padding: 2px 8px;
        font-size: 0.78rem;
    }

    .storage-item-delete:hover {
        border-color: var(--error);
        color: var(--error);
    }

    /* ---------- Render-Einstellungen ---------- */
    .render-settings {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 12px;
        padding: 8px 12px;
        border-bottom: 1px solid var(--border);
        background: var(--panel-bg);
        flex-shrink: 0;
    }

    .render-settings label {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 0.78rem;
        color: var(--theme-text-muted);
    }

    .render-settings select {
        font-size: 0.78rem;
        padding: 5px 7px;
    }

    .render-settings input[type="color"] {
        width: 34px;
        height: 28px;
        padding: 2px;
        border: 1px solid var(--border);
        border-radius: 5px;
        background: var(--theme-surface-muted);
        cursor: pointer;
    }

    @media (max-width: 800px) {
        .main {
            grid-template-columns: 1fr !important;
            grid-template-rows: minmax(240px, 1fr) 6px minmax(240px, 1fr);
        }

        .divider {
            cursor: row-resize;
        }

        .storage-list {
            max-height: 80px;
        }
    }

    /* CodeMirror lädt sein "neat"-Theme als fest verdrahtetes, helles CSS von
       einem CDN – das passt sich nicht automatisch an. Überschreibt hier nur
       die Editor-Oberfläche (nicht die Mermaid-Syntax-Highlight-Farben, die
       auf hellem wie dunklem Grund gut lesbar bleiben). */
    @media (prefers-color-scheme: dark) {
        .editor-wrap .CodeMirror {
            background: var(--theme-surface-muted);
            color: var(--theme-text);
        }

        .editor-wrap .CodeMirror-gutters {
            background: var(--theme-surface-muted);
            border-right: 1px solid var(--border);
        }

        .editor-wrap .CodeMirror-linenumber {
            color: var(--theme-text-muted);
        }

        .editor-wrap .CodeMirror-cursor {
            border-left: 1px solid var(--theme-text);
        }

        .editor-wrap .CodeMirror-selected {
            background: var(--theme-accent-soft);
        }

        .editor-wrap .cm-comment { color: var(--theme-text-muted); }
    }
</style>
</head>
<body>
<script src="../assets/js/nav.js"></script>

<header>
    <div class="brand">
        <h1>Mermaid Editor</h1>
    </div>
    <div class="controls">
        <select id="exampleSelect">
            <option value="">Beispiel laden …</option>
            <option value="flowchart">Flowchart</option>
            <option value="sequence">Sequenzdiagramm</option>
            <option value="class">Klassendiagramm</option>
            <option value="state">Zustandsdiagramm</option>
            <option value="er">ER-Diagramm</option>
            <option value="gantt">Gantt</option>
            <option value="pie">Kreisdiagramm</option>
        </select>
        <button type="button" id="downloadBtn" disabled>SVG herunterladen</button>
        <button type="button" id="imageExportBtn" class="primary" disabled>Als Bild exportieren</button>
        <a href="https://mermaid.js.org/intro/syntax-reference.html" target="_blank" rel="noopener">Hilfe</a>
    </div>
</header>

<div class="main" id="mainGrid">
    <div class="pane pane-left">
        <div class="storage-panel" id="storagePanel">
            <button type="button" class="storage-toggle" id="storageToggle" aria-expanded="true" aria-controls="storageBody">
                <span class="storage-toggle-arrow">▾</span>
                <span>Browser Speicher</span>
            </button>
            <div class="storage-body" id="storageBody">
                <div class="storage-save-row">
                    <input type="text" id="saveNameInput" placeholder="Dateiname …" maxlength="60">
                    <button type="button" id="saveBtn">Speichern</button>
                </div>
                <ul class="storage-list" id="storageList"></ul>
            </div>
        </div>
        <div class="editor-wrap">
            <textarea id="editor"></textarea>
        </div>
        <div class="console" id="consoleOutput"><span class="placeholder">Bereit.</span></div>
    </div>

    <div class="divider" id="divider" role="separator" aria-label="Spaltenbreite ändern"></div>

    <div class="pane pane-right">
        <div class="render-settings">
            <label for="themeSelect">Design
                <select id="themeSelect">
                    <option value="default">Standard</option>
                    <option value="neutral">Neutral</option>
                    <option value="dark">Dunkel</option>
                    <option value="forest">Forest</option>
                    <option value="base">Base</option>
                </select>
            </label>
            <label for="bgColorInput">Hintergrund
                <input type="color" id="bgColorInput" value="#f4f4f4">
            </label>
            <label for="borderColorInput">Rahmen
                <input type="color" id="borderColorInput" value="#333333">
            </label>
            <label for="borderWidthSelect">Breite
                <select id="borderWidthSelect">
                    <option value="0">kein Rahmen</option>
                    <option value="1">dünn</option>
                    <option value="3">mittel</option>
                    <option value="6">dick</option>
                </select>
            </label>
        </div>
        <div class="diagram-scroll" id="diagramOutput"></div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/mode/simple.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
<script>
    const STORAGE_KEY = 'mermaid-editor-code';
    const FILES_KEY = 'mermaid-editor-files';

    const EXAMPLES = {
        flowchart:
`flowchart TD
    A[Start] --> B{Diagramm gültig?}
    B -- Ja --> C[Rendern]
    B -- Nein --> D[Fehler anzeigen]
    C --> E[Fertig]
    D --> B`,
        sequence:
`sequenceDiagram
    participant Browser
    participant Editor
    participant Mermaid

    Browser->>Editor: Text eingeben
    Editor->>Mermaid: render(code)
    alt gültige Syntax
        Mermaid-->>Editor: SVG
        Editor-->>Browser: Vorschau anzeigen
    else Fehler
        Mermaid-->>Editor: Fehlermeldung
        Editor-->>Browser: Konsole aktualisieren
    end`,
        class:
`classDiagram
    class Diagramm {
        +String code
        +render()
    }
    class Editor {
        +CodeMirror cm
        +onChange()
    }
    Editor --> Diagramm : erzeugt`,
        state:
`stateDiagram-v2
    [*] --> Bearbeiten
    Bearbeiten --> Rendern : Eingabe (debounced)
    Rendern --> Vorschau : Erfolg
    Rendern --> Fehler : Syntaxfehler
    Fehler --> Bearbeiten
    Vorschau --> Bearbeiten`,
        er:
`erDiagram
    EDITOR ||--|| DIAGRAMM : rendert
    DIAGRAMM ||--o{ KNOTEN : enthaelt
    KNOTEN }o--o{ KANTE : verbindet`,
        gantt:
`gantt
    title Mini-Projektplan
    dateFormat YYYY-MM-DD
    section Planung
    Konzept       :a1, 2026-07-01, 3d
    section Umsetzung
    Editor bauen  :a2, after a1, 5d
    Testen        :a3, after a2, 2d`,
        pie:
`pie title Genutzte Diagrammtypen
    "Flowchart" : 45
    "Sequenz" : 20
    "Sonstige" : 35`
    };

    const DEFAULT_CODE = EXAMPLES.flowchart;

    CodeMirror.defineSimpleMode('mermaid', {
        start: [
            { regex: /%%.*/, token: 'comment' },
            { regex: /"(?:[^\\]|\\.)*?"/, token: 'string' },
            {
                regex: /\b(?:flowchart|graph|sequenceDiagram|classDiagram|stateDiagram(?:-v2)?|erDiagram|journey|gantt|pie|quadrantChart|requirementDiagram|gitGraph|mindmap|timeline|sankey-beta|block-beta|C4Context|xychart-beta)\b/,
                token: 'keyword'
            },
            {
                regex: /\b(?:participant|actor|note|loop|alt|else|opt|par|and|rect|activate|deactivate|title|section|state|class|click|subgraph|end|left of|right of|over|dateFormat)\b/,
                token: 'keyword'
            },
            { regex: /\b(?:TD|TB|BT|RL|LR)\b/, token: 'atom' },
            { regex: /-->>|-->|---|-\.->|-\.-|==>|--x|--o|<-->|\|>|\.\.>|\.\.\|>|--\|>|::/, token: 'operator' },
            { regex: /\d+/, token: 'number' },
            { regex: /[{}[\]()]/, token: 'bracket' }
        ]
    });

    const cm = CodeMirror.fromTextArea(document.getElementById('editor'), {
        mode: 'mermaid',
        theme: 'neat',
        lineNumbers: true,
        lineWrapping: true,
        tabSize: 2,
        indentUnit: 2,
        autofocus: true
    });

    let saved = null;
    try {
        saved = localStorage.getItem(STORAGE_KEY);
    } catch (e) {
        saved = null;
    }
    cm.setValue(saved || DEFAULT_CODE);

    // ---------- Render-Einstellungen (Design, Hintergrund, Rahmen) ----------
    // Gelten nur fuer die aktuelle Sitzung - nur der Code wird im Browser gespeichert.
    const settings = {
        theme: 'default',
        bgColor: '#f4f4f4',
        borderColor: '#333333',
        borderWidth: '0'
    };

    mermaid.initialize({ startOnLoad: false, theme: settings.theme, securityLevel: 'strict' });

    const consoleEl = document.getElementById('consoleOutput');
    const outputEl = document.getElementById('diagramOutput');
    const downloadBtn = document.getElementById('downloadBtn');
    const imageExportBtn = document.getElementById('imageExportBtn');
    const exampleSelect = document.getElementById('exampleSelect');
    const themeSelect = document.getElementById('themeSelect');
    const bgColorInput = document.getElementById('bgColorInput');
    const borderColorInput = document.getElementById('borderColorInput');
    const borderWidthSelect = document.getElementById('borderWidthSelect');
    const storagePanel = document.getElementById('storagePanel');
    const storageToggle = document.getElementById('storageToggle');
    const storageList = document.getElementById('storageList');
    const saveNameInput = document.getElementById('saveNameInput');
    const saveBtn = document.getElementById('saveBtn');

    storageToggle.addEventListener('click', () => {
        const collapsed = storagePanel.classList.toggle('collapsed');
        storageToggle.setAttribute('aria-expanded', String(!collapsed));
    });

    function applyRenderSettings() {
        outputEl.style.backgroundColor = settings.bgColor;
        const bw = parseInt(settings.borderWidth, 10) || 0;
        outputEl.style.border = bw > 0 ? `${bw}px solid ${settings.borderColor}` : 'none';
    }

    themeSelect.value = settings.theme;
    bgColorInput.value = settings.bgColor;
    borderColorInput.value = settings.borderColor;
    borderWidthSelect.value = settings.borderWidth;
    applyRenderSettings();

    themeSelect.addEventListener('change', () => {
        settings.theme = themeSelect.value;
        mermaid.initialize({ startOnLoad: false, theme: settings.theme, securityLevel: 'strict' });
        renderDiagram();
    });

    bgColorInput.addEventListener('input', () => {
        settings.bgColor = bgColorInput.value;
        applyRenderSettings();
    });

    borderColorInput.addEventListener('input', () => {
        settings.borderColor = borderColorInput.value;
        applyRenderSettings();
    });

    borderWidthSelect.addEventListener('change', () => {
        settings.borderWidth = borderWidthSelect.value;
        applyRenderSettings();
    });

    // ---------- Browser Speicher (benannte Skripte) ----------
    function loadFiles() {
        try {
            const raw = localStorage.getItem(FILES_KEY);
            return raw ? JSON.parse(raw) : {};
        } catch (e) {
            return {};
        }
    }

    function saveFiles(files) {
        try {
            localStorage.setItem(FILES_KEY, JSON.stringify(files));
        } catch (e) {
            /* localStorage evtl. nicht verfügbar (privater Modus) */
        }
    }

    function renderStorageList() {
        const files = loadFiles();
        const names = Object.keys(files).sort((a, b) => a.localeCompare(b, 'de'));
        storageList.innerHTML = '';

        if (names.length === 0) {
            const li = document.createElement('li');
            li.className = 'storage-empty';
            li.textContent = 'Keine gespeicherten Dateien.';
            storageList.appendChild(li);
            return;
        }

        names.forEach((name) => {
            const li = document.createElement('li');
            li.className = 'storage-item';

            const loadBtn = document.createElement('button');
            loadBtn.type = 'button';
            loadBtn.className = 'storage-item-name';
            loadBtn.textContent = name;
            loadBtn.title = 'Laden: ' + name;
            loadBtn.addEventListener('click', () => {
                cm.setValue(files[name]);
                cm.focus();
            });

            const deleteBtn = document.createElement('button');
            deleteBtn.type = 'button';
            deleteBtn.className = 'storage-item-delete';
            deleteBtn.textContent = '✕';
            deleteBtn.title = 'Löschen: ' + name;
            deleteBtn.addEventListener('click', () => {
                if (!confirm(`"${name}" wirklich löschen?`)) return;
                const current = loadFiles();
                delete current[name];
                saveFiles(current);
                renderStorageList();
            });

            li.appendChild(loadBtn);
            li.appendChild(deleteBtn);
            storageList.appendChild(li);
        });
    }

    function handleSave() {
        const name = saveNameInput.value.trim();
        if (!name) {
            saveNameInput.focus();
            return;
        }
        const files = loadFiles();
        if (files[name] && !confirm(`"${name}" existiert bereits. Überschreiben?`)) {
            return;
        }
        files[name] = cm.getValue();
        saveFiles(files);
        saveNameInput.value = '';
        renderStorageList();
    }

    saveBtn.addEventListener('click', handleSave);
    saveNameInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') handleSave();
    });

    renderStorageList();

    let renderSeq = 0;

    async function renderDiagram() {
        const code = cm.getValue().trim();

        if (!code) {
            consoleEl.innerHTML = '<span class="placeholder">Bereit.</span>';
            consoleEl.classList.remove('has-error');
            outputEl.innerHTML = '';
            downloadBtn.disabled = true;
            imageExportBtn.disabled = true;
            return;
        }

        const seq = ++renderSeq;
        const id = 'mmd-diagram-' + Date.now() + '-' + seq;
        try {
            const { svg } = await mermaid.render(id, code);
            if (seq !== renderSeq) return;
            outputEl.innerHTML = svg;
            consoleEl.textContent = '✓ Kein Fehler';
            consoleEl.classList.remove('has-error');
            downloadBtn.disabled = false;
            imageExportBtn.disabled = false;
        } catch (err) {
            if (seq !== renderSeq) return;
            consoleEl.textContent = (err && err.message) ? err.message : String(err);
            consoleEl.classList.add('has-error');
        } finally {
            // Mermaid haengt bei einem Parse-Fehler intern ein Fehler-SVG
            // ("d" + id) lose an document.body statt es selbst zu entfernen.
            const leaked = document.getElementById('d' + id);
            if (leaked) leaked.remove();
        }
    }

    let debounceTimer;
    cm.on('change', () => {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(renderDiagram, 400);
        try {
            localStorage.setItem(STORAGE_KEY, cm.getValue());
        } catch (e) {
            /* localStorage evtl. nicht verfügbar (privater Modus) */
        }
    });

    exampleSelect.addEventListener('change', () => {
        const key = exampleSelect.value;
        if (!key) return;
        cm.setValue(EXAMPLES[key]);
        exampleSelect.value = '';
        cm.focus();
    });

    downloadBtn.addEventListener('click', () => {
        const svgEl = outputEl.querySelector('svg');
        if (!svgEl) return;
        let source = new XMLSerializer().serializeToString(svgEl);
        if (!source.includes('xmlns="http://www.w3.org/2000/svg"')) {
            source = source.replace('<svg', '<svg xmlns="http://www.w3.org/2000/svg"');
        }
        const blob = new Blob([source], { type: 'image/svg+xml;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'diagram.svg';
        a.click();
        URL.revokeObjectURL(url);
    });

    function getSvgSize(svgEl) {
        const vb = svgEl.viewBox && svgEl.viewBox.baseVal;
        if (vb && vb.width && vb.height) {
            return { width: vb.width, height: vb.height };
        }
        const w = parseFloat(svgEl.getAttribute('width'));
        const h = parseFloat(svgEl.getAttribute('height'));
        if (w && h) {
            return { width: w, height: h };
        }
        const rect = svgEl.getBoundingClientRect();
        return { width: rect.width, height: rect.height };
    }

    imageExportBtn.addEventListener('click', async () => {
        const svgEl = outputEl.querySelector('svg');
        if (!svgEl) return;

        let source = new XMLSerializer().serializeToString(svgEl);
        if (!source.includes('xmlns="http://www.w3.org/2000/svg"')) {
            source = source.replace('<svg', '<svg xmlns="http://www.w3.org/2000/svg"');
        }

        const { width, height } = getSvgSize(svgEl);
        const scale = 2;
        const padding = 20;
        const borderWidth = parseInt(settings.borderWidth, 10) || 0;
        const canvasWidth = (width + padding * 2 + borderWidth * 2) * scale;
        const canvasHeight = (height + padding * 2 + borderWidth * 2) * scale;

        // Mermaid-SVGs enthalten <foreignObject>-Textknoten. Ueber eine
        // blob:-URL geladen markiert Chrome den Canvas dadurch als "tainted"
        // (kein toBlob/toDataURL mehr moeglich) - eine data:-URI umgeht das.
        const svgDataUri = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(source)));

        try {
            const img = await new Promise((resolve, reject) => {
                const image = new Image();
                image.onload = () => resolve(image);
                image.onerror = () => reject(new Error('SVG konnte nicht geladen werden'));
                image.src = svgDataUri;
            });

            const canvas = document.createElement('canvas');
            canvas.width = canvasWidth;
            canvas.height = canvasHeight;
            const ctx = canvas.getContext('2d');

            ctx.fillStyle = settings.bgColor;
            ctx.fillRect(0, 0, canvasWidth, canvasHeight);

            if (borderWidth > 0) {
                ctx.strokeStyle = settings.borderColor;
                ctx.lineWidth = borderWidth * scale;
                const half = (borderWidth * scale) / 2;
                ctx.strokeRect(half, half, canvasWidth - borderWidth * scale, canvasHeight - borderWidth * scale);
            }

            const drawX = (padding + borderWidth) * scale;
            const drawY = (padding + borderWidth) * scale;
            ctx.drawImage(img, drawX, drawY, width * scale, height * scale);

            canvas.toBlob((pngBlob) => {
                if (!pngBlob) return;
                const pngUrl = URL.createObjectURL(pngBlob);
                const a = document.createElement('a');
                a.href = pngUrl;
                a.download = 'diagram.png';
                a.click();
                URL.revokeObjectURL(pngUrl);
            }, 'image/png');
        } catch (err) {
            consoleEl.textContent = 'Bildexport fehlgeschlagen: ' + ((err && err.message) ? err.message : String(err));
            consoleEl.classList.add('has-error');
        }
    });

    // ---------- Trennlinie zum Verschieben der Spaltenbreite ----------
    const mainGrid = document.getElementById('mainGrid');
    const divider = document.getElementById('divider');
    let dragging = false;

    divider.addEventListener('mousedown', () => {
        dragging = true;
        divider.classList.add('dragging');
        document.body.style.userSelect = 'none';
    });

    window.addEventListener('mousemove', (e) => {
        if (!dragging) return;
        const rect = mainGrid.getBoundingClientRect();
        const isStacked = window.innerWidth <= 800;
        const min = 160;

        if (isStacked) {
            let topHeight = e.clientY - rect.top;
            topHeight = Math.max(min, Math.min(rect.height - min - 6, topHeight));
            mainGrid.style.gridTemplateRows = `${topHeight}px 6px 1fr`;
        } else {
            let leftWidth = e.clientX - rect.left;
            leftWidth = Math.max(min, Math.min(rect.width - min - 6, leftWidth));
            mainGrid.style.gridTemplateColumns = `${leftWidth}px 6px 1fr`;
        }
    });

    window.addEventListener('mouseup', () => {
        if (!dragging) return;
        dragging = false;
        divider.classList.remove('dragging');
        document.body.style.userSelect = '';
        cm.refresh();
    });

    window.addEventListener('resize', () => cm.refresh());

    renderDiagram();
</script>

</body>
</html>
