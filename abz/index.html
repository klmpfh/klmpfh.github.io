<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Erfasst und verwaltet Arbeitszeiten für den Tag, ohne Daten zu speichern.">
    <title>Arbeitszeit-Tracker</title>
    <link rel="stylesheet" href="../assets/css/reset.css">
    <style>
        :root {
            --bg-color: #f4f6f9;
            --container-bg: #ffffff;
            --text-color: #2d3748;
            --text-muted: #718096;
            --primary: #3182ce;
            --primary-light: #ebf8ff;
            --success: #38a169;
            --success-light: #f0fff4;
            --danger: #e53e3e;
            --warning: #dd6b20;
            --warning-light: #fffaf0;
            --border-color: #e2e8f0;
            --highlight-bg: #f7fafc;
        }

        button, input {
            font-family: inherit;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 30px 15px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            background: var(--container-bg);
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            padding: 30px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 20px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
        }

        /* ── Eingabefelder ── */
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="time"],
        .duration-input {
            padding: 10px 14px;
            font-size: 20px;
            font-weight: 600;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-color);
            background-color: #fff;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="time"] { width: 130px; }
        .duration-input   { width: 110px; }

        input[type="time"]:focus,
        .duration-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-light);
        }

        .duration-input.invalid {
            border-color: var(--danger);
        }

        /* Arbeitszeit-Eingaben */
        .work-inputs {
            display: flex;
            align-items: stretch;
            gap: 18px;
            padding: 16px;
            background: var(--highlight-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .input-block {
            display: flex;
            flex-direction: column;
            gap: 8px;
            justify-content: flex-start;
        }

        .input-block-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .work-inputs-divider {
            width: 1px;
            background: var(--border-color);
            align-self: stretch;
            margin: 2px 0;
        }

        .linked-fields {
            display: flex;
            align-items: flex-end;
            gap: 10px;
            flex-wrap: wrap;
        }

        .link-indicator {
            font-size: 20px;
            color: var(--text-muted);
            padding-bottom: 8px;
            line-height: 1;
            user-select: none;
        }

        .work-inputs-hint {
            font-size: 12px;
            color: var(--text-muted);
        }

        /* ── Pausen-Bereich ── */
        .pause-section {
            background: var(--highlight-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 14px 16px;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .pause-controls {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .pause-controls-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-right: 4px;
        }

        .btn-pause-start,
        .btn-pause-stop,
        .btn-add-pause,
        .btn-confirm,
        .btn-cancel {
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-pause-start,
        .btn-pause-stop,
        .btn-add-pause {
            padding: 7px 14px;
        }

        .btn-pause-start,
        .btn-pause-stop {
            border: none;
            color: #fff;
            transition: opacity 0.2s;
        }
        .btn-pause-start:hover,
        .btn-pause-stop:hover { opacity: 0.85; }

        .btn-pause-start { background-color: var(--warning); }
        .btn-pause-stop  { background-color: var(--success); }

        .btn-add-pause {
            background-color: #fff;
            color: var(--primary);
            border: 1px solid var(--primary);
            transition: all 0.2s;
        }
        .btn-add-pause:hover { background-color: var(--primary); color: #fff; }

        .running-pause-info {
            font-size: 13px;
            color: var(--success);
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .running-dot {
            width: 8px;
            height: 8px;
            background: var(--success);
            border-radius: 50%;
            flex-shrink: 0;
            animation: pulse 1.2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.25; }
        }

        .add-pause-form {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            padding: 10px 12px;
            background: #fff;
            border: 1px solid var(--border-color);
            border-radius: 6px;
        }

        .add-pause-form .form-label {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 500;
        }

        .add-pause-form input[type="time"] {
            width: auto;
            padding: 5px 10px;
            font-size: 15px;
            font-weight: 500;
        }

        .btn-confirm,
        .btn-cancel {
            padding: 6px 14px;
        }

        .btn-confirm {
            background-color: var(--success);
            color: #fff;
            border: none;
        }

        .btn-cancel {
            background-color: #fff;
            color: var(--text-muted);
            border: 1px solid var(--border-color);
            font-weight: 500;
        }

        .pause-items-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .pause-item {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .pause-done    { background: #edf2f7; color: var(--text-muted); }
        .pause-running { background: var(--success-light); color: var(--success); }
        .pause-future  { background: var(--primary-light); color: var(--primary); }

        .pause-edit-btn {
            background: none;
            border: none;
            color: #a0aec0;
            font-size: 12px;
            line-height: 1;
            padding: 0 2px;
            cursor: pointer;
        }
        .pause-edit-btn:hover { color: var(--primary); }

        .pause-delete-btn {
            background: none;
            border: none;
            color: #a0aec0;
            font-size: 14px;
            line-height: 1;
            padding: 0 2px;
            cursor: pointer;
        }
        .pause-delete-btn:hover { color: var(--danger); }

        /* ── Warnungen ── */
        .warning-banner {
            background: var(--warning-light);
            border: 1px solid #f6ad55;
            border-left: 4px solid var(--warning);
            border-radius: 6px;
            padding: 9px 14px;
            font-size: 13px;
            color: #744210;
            font-weight: 500;
        }

        /* ── Timeline ── */
        .timeline-container {
            position: relative;
            margin-bottom: 24px;
            background: #fff;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 10px;
            overflow: visible;
        }

        .timeline-svg {
            width: 100%;
            height: 120px;
            display: block;
            overflow: visible;
        }

        /* ── Stat-Cards ── */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 16px;
            margin-bottom: 20px;
        }

        @media (max-width: 900px) {
            .stats-grid { grid-template-columns: repeat(3, 1fr); }
        }

        @media (max-width: 640px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
        }

        .stat-card {
            background: var(--highlight-bg);
            border: 2px solid var(--border-color);
            border-radius: 8px;
            padding: 16px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.15s, background 0.15s;
        }

        .stat-card:hover {
            border-color: #a0c8e8;
        }

        .stat-card.selected {
            border-color: var(--primary);
            background: var(--primary-light);
        }

        .stat-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            font-family: monospace;
            color: var(--text-color);
            line-height: 1.1;
        }

        .stat-value.pos { color: var(--danger); }
        .stat-value.neg { color: var(--text-muted); }
        .stat-value.muted { color: var(--text-muted); font-size: 22px; }

        .stat-progress-bar {
            margin-top: 8px;
            background: var(--border-color);
            border-radius: 20px;
            height: 6px;
            overflow: hidden;
        }

        .stat-progress-fill {
            background: var(--success);
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
            border-radius: 20px;
        }

        .footer-info {
            font-size: 12px;
            color: var(--text-muted);
            text-align: right;
        }

        .label-bg { fill: #fff; opacity: 0.85; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Arbeitszeit-Tracker</h1>
    </header>

    <!-- Arbeitszeitfelder -->
    <div class="work-inputs">
        <div class="input-block">
            <div class="input-group">
                <label for="startTime">Startzeit</label>
                <input type="time" id="startTime">
            </div>
        </div>

        <div class="work-inputs-divider"></div>

        <div class="input-block">
            <div class="linked-fields">
                <div class="input-group">
                    <label for="dailyTime">Tagesarbeitszeit</label>
                    <input type="text" id="dailyTime" class="duration-input" placeholder="H:MM" maxlength="6">
                </div>
                <div class="link-indicator" title="Die Felder sind verknüpft (Woche ÷ 5 = Tag)">⇄</div>
                <div class="input-group">
                    <label for="weeklyTime">Wochenarbeitszeit</label>
                    <input type="text" id="weeklyTime" class="duration-input" placeholder="H:MM" maxlength="6">
                </div>
            </div>
            <span class="work-inputs-hint">Format: Stunden:Minuten&ensp;(z.&nbsp;B. 7:36 oder 38:00)</span>
        </div>
    </div>

    <!-- Pausen -->
    <div class="pause-section">
        <div class="pause-controls">
            <span class="pause-controls-label">Pausen</span>
            <button id="pauseToggleBtn" onclick="togglePause()" class="btn-pause-start">Pause starten</button>
            <span id="runningPauseDisplay" style="display:none" class="running-pause-info">
                <span class="running-dot"></span>
                Läuft seit <span id="runningPauseStartLabel">--:--</span>
                (<span id="runningPauseDuration">0</span> min)
            </span>
            <button onclick="toggleAddPauseForm()" class="btn-add-pause">+ Eintragen</button>
        </div>

        <div id="addPauseForm" class="add-pause-form" style="display:none">
            <span id="addPauseFormTitle" class="form-label" style="font-weight:600;margin-right:4px">Pause eintragen:</span>
            <span class="form-label">Von:</span>
            <input type="time" id="pauseFromInput">
            <span class="form-label">Bis:</span>
            <input type="time" id="pauseToInput">
            <button id="addPauseConfirmBtn" onclick="addPauseFromForm()" class="btn-confirm">Hinzufügen</button>
            <button onclick="toggleAddPauseForm()" class="btn-cancel">Abbrechen</button>
        </div>

        <div id="pauseList"></div>
        <div id="legalWarnings"></div>
    </div>

    <!-- Timeline -->
    <div class="timeline-container">
        <svg class="timeline-svg" id="timelineSvg"></svg>
    </div>

    <!-- Ergebnisse -->
    <div class="stats-grid">
        <div class="stat-card" id="statCardTarget" onclick="selectTitleStat('target')" title="Klicken, um diesen Wert im Seitentitel anzuzeigen">
            <div class="stat-label">Zielzeit</div>
            <div class="stat-value muted" id="statTargetTime">–</div>
        </div>
        <div class="stat-card" id="statCardNet" onclick="selectTitleStat('net')" title="Klicken, um diesen Wert im Seitentitel anzuzeigen">
            <div class="stat-label">Netto-Arbeitszeit</div>
            <div class="stat-value" id="statNetWork">–</div>
        </div>
        <div class="stat-card" id="statCardPause" onclick="selectTitleStat('pause')" title="Klicken, um diesen Wert im Seitentitel anzuzeigen">
            <div class="stat-label">Pausen gesamt</div>
            <div class="stat-value muted" id="statPauseTotal">–</div>
        </div>
        <div class="stat-card" id="statCardDiff" onclick="selectTitleStat('diff')" title="Klicken, um diesen Wert im Seitentitel anzuzeigen">
            <div class="stat-label">Rest / Überziehung</div>
            <div class="stat-value" id="statDiff">–</div>
        </div>
        <div class="stat-card" id="statCardProgress" onclick="selectTitleStat('percent')" title="Klicken, um diesen Wert im Seitentitel anzuzeigen">
            <div class="stat-label">Fortschritt</div>
            <div class="stat-value" id="statProgress">–</div>
            <div class="stat-progress-bar">
                <div class="stat-progress-fill" id="statProgressBar"></div>
            </div>
        </div>
    </div>

    <div class="footer-info">Aktualisiert sich automatisch alle 10 Sekunden. Letzte Aktualisierung: <span id="lastUpdate">–</span> · v<span id="versionNumber">6.4</span></div>
</div>

<script>
    // ── ZUSTAND ───────────────────────────────────────────────────────────
    let pauses             = [];     // [{ startMin, durationMin }] – Minuten ab Mitternacht
    let runningPauseStart  = null;   // Date.now() wenn Pause läuft, sonst null
    let addPauseFormVisible= false;
    let editingPauseIndex  = null;   // null = neue Pause, number = Bearbeitung
    let titleStat          = 'percent'; // welcher Stat-Wert im Seitentitel angezeigt wird

    const titleStatLabels = {
        percent: 'Fortschritt',
        target:  'Zielzeit',
        net:     'Netto-Arbeitszeit',
        pause:   'Pausen gesamt',
        diff:    'Rest / Überziehung'
    };
    const maxTimelineDuration = 660; // 11h – visuelle X-Achsen-Länge in Minuten

    // ── DOM (einmalig auflösen statt bei jedem Update neu zu suchen) ───────
    const startTimeInput  = document.getElementById('startTime');
    const dailyTimeInput  = document.getElementById('dailyTime');
    const weeklyTimeInput = document.getElementById('weeklyTime');
    const svg             = document.getElementById('timelineSvg');

    const dom = {
        pauseToggleBtn:         document.getElementById('pauseToggleBtn'),
        runningPauseDisplay:    document.getElementById('runningPauseDisplay'),
        runningPauseStartLabel: document.getElementById('runningPauseStartLabel'),
        runningPauseDuration:   document.getElementById('runningPauseDuration'),
        addPauseForm:           document.getElementById('addPauseForm'),
        addPauseFormTitle:      document.getElementById('addPauseFormTitle'),
        addPauseConfirmBtn:     document.getElementById('addPauseConfirmBtn'),
        pauseFromInput:         document.getElementById('pauseFromInput'),
        pauseToInput:           document.getElementById('pauseToInput'),
        pauseList:              document.getElementById('pauseList'),
        legalWarnings:          document.getElementById('legalWarnings'),
        statTargetTime:         document.getElementById('statTargetTime'),
        statNetWork:            document.getElementById('statNetWork'),
        statPauseTotal:         document.getElementById('statPauseTotal'),
        statDiff:               document.getElementById('statDiff'),
        statProgress:           document.getElementById('statProgress'),
        statProgressBar:        document.getElementById('statProgressBar'),
        lastUpdate:             document.getElementById('lastUpdate'),
    };

    const titleStatCards = {
        percent: document.getElementById('statCardProgress'),
        target:  document.getElementById('statCardTarget'),
        net:     document.getElementById('statCardNet'),
        pause:   document.getElementById('statCardPause'),
        diff:    document.getElementById('statCardDiff')
    };

    // ── INITIALISIERUNG ───────────────────────────────────────────────────
    window.addEventListener('DOMContentLoaded', () => {
        loadFromUrlParams();
        if (!startTimeInput.value) {
            const now = new Date();
            startTimeInput.value = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
        }
        updateStatCardSelection();
        startTimeInput.focus();
        startTimeInput.select();
        updateTracker();
        setInterval(updateTracker, 10000);
    });

    /** Wird beim Klick auf eine Statistik-Kachel aufgerufen und legt fest, was im Seitentitel steht */
    function selectTitleStat(stat) {
        titleStat = stat;
        updateStatCardSelection();
        updateTracker();
    }

    /** Markiert die aktuell für den Titel gewählte Kachel visuell */
    function updateStatCardSelection() {
        Object.entries(titleStatCards).forEach(([stat, el]) => {
            el.classList.toggle('selected', stat === titleStat);
        });
    }

    /** Setzt den Seitentitel gemäß der gewählten Statistik-Kachel */
    function updateTitle(ctx) {
        const label = titleStatLabels[titleStat];

        if (titleStat === 'net')   { document.title = `${formatDuration(ctx.netWorkMin)} h – ${label}`;  return; }
        if (titleStat === 'pause') { document.title = `${formatDuration(ctx.allPauseMin)} h – ${label}`; return; }

        if (!ctx.hasTarget) { document.title = 'Arbeitszeit-Tracker'; return; }

        if (titleStat === 'target') {
            document.title = `${formatMinutesToTime(ctx.targetEndMin)} – ${label}`;
        } else if (titleStat === 'diff') {
            document.title = `${formatDifference(ctx.remaining)} – ${label}`;
        } else {
            document.title = `${ctx.progressUncapped.toFixed(1)} % – ${label}`;
        }
    }

    // Eingabe-Events
    startTimeInput.addEventListener('input', updateTracker);

    dom.pauseFromInput.addEventListener('input', updateTracker);
    dom.pauseToInput.addEventListener('input', updateTracker);

    dailyTimeInput.addEventListener('input', () => {
        const min = parseDuration(dailyTimeInput.value);
        weeklyTimeInput.value = min > 0 ? formatDuration(min * 5) : '';
        markValid(dailyTimeInput, min > 0 || !dailyTimeInput.value.trim());
        updateTracker();
    });

    weeklyTimeInput.addEventListener('input', () => {
        const min = parseDuration(weeklyTimeInput.value);
        dailyTimeInput.value = min > 0 ? formatDuration(Math.round(min / 5)) : '';
        markValid(weeklyTimeInput, min > 0 || !weeklyTimeInput.value.trim());
        updateTracker();
    });

    function markValid(input, valid) {
        input.classList.toggle('invalid', !valid);
    }

    // ── URL-PARAMETER (Tages-/Wochenarbeitszeit & Pausen als Link merken) ───

    /** Liest daily/weekly/pauses aus den GET-Parametern und befüllt die Felder */
    function loadFromUrlParams() {
        const params = new URLSearchParams(window.location.search);
        const daily  = params.get('daily');
        const weekly = params.get('weekly');

        if (daily) {
            dailyTimeInput.value = daily;
            const min = parseDuration(daily);
            weeklyTimeInput.value = min > 0 ? formatDuration(min * 5) : '';
        } else if (weekly) {
            weeklyTimeInput.value = weekly;
            const min = parseDuration(weekly);
            dailyTimeInput.value = min > 0 ? formatDuration(Math.round(min / 5)) : '';
        }

        const pausesParam = params.get('pauses');
        if (pausesParam) pauses = parsePausesParam(pausesParam);

        const titleStatParam = params.get('titleStat');
        if (titleStatParam && titleStatCards[titleStatParam]) titleStat = titleStatParam;
    }

    /** "HH:MM-HH:MM,HH:MM-HH:MM" → [{ startMin, durationMin }] */
    function parsePausesParam(str) {
        return str.split(',').map(part => {
            const [from, to] = part.split('-');
            if (!from || !to) return null;
            const fromMin = parseTimeToMinutes(from);
            let   toMin   = parseTimeToMinutes(to);
            if (toMin <= fromMin) toMin += 1440;
            return { startMin: fromMin, durationMin: toMin - fromMin };
        }).filter(p => p && p.durationMin > 0);
    }

    /** Pausenliste → "HH:MM-HH:MM,HH:MM-HH:MM" */
    function serializePausesParam() {
        return pauses
            .map(p => `${formatMinutesToTime(p.startMin)}-${formatMinutesToTime(p.startMin + p.durationMin)}`)
            .join(',');
    }

    /** Baut einen Query-String, hält ":" und "," aber unkodiert (Lesbarkeit) */
    function buildQueryString(paramsObj) {
        return Object.entries(paramsObj)
            .filter(([, v]) => v)
            .map(([k, v]) => `${k}=${encodeURIComponent(v).replace(/%3A/g, ':').replace(/%2C/g, ',')}`)
            .join('&');
    }

    /** Schreibt daily/weekly/pauses/titleStat als GET-Parameter in die URL (ohne Reload/History-Eintrag) */
    let lastUrlQuery = null;

    function updateUrlParams() {
        const qs = buildQueryString({
            daily:     dailyTimeInput.value.trim(),
            weekly:    weeklyTimeInput.value.trim(),
            pauses:    serializePausesParam(),
            titleStat: titleStat !== 'percent' ? titleStat : ''
        });
        if (qs === lastUrlQuery) return;
        lastUrlQuery = qs;
        const newUrl = window.location.pathname + (qs ? '?' + qs : '');
        history.replaceState(null, '', newUrl);
    }

    // ── PAUSEN-STEUERUNG ──────────────────────────────────────────────────

    /** Prüft, ob sich [fromMin, toMin) mit einer bestehenden Pause überschneidet (excludeIndex wird bei Bearbeitung ausgelassen) */
    function findOverlappingPauseIndex(fromMin, toMin, excludeIndex) {
        return pauses.findIndex((p, i) => {
            if (i === excludeIndex) return false;
            const pEnd = p.startMin + p.durationMin;
            return fromMin < pEnd && p.startMin < toMin;
        });
    }

    function isMinuteInsideAnyPause(min) {
        return pauses.some(p => min >= p.startMin && min < p.startMin + p.durationMin);
    }

    function togglePause() {
        const btn     = dom.pauseToggleBtn;
        const display = dom.runningPauseDisplay;

        if (runningPauseStart === null) {
            const nowMin = new Date().getHours() * 60 + new Date().getMinutes();
            if (isMinuteInsideAnyPause(nowMin)) {
                alert('Jetzt liegt bereits eine eingetragene Pause vor. Bitte diese zuerst bearbeiten oder löschen.');
                return;
            }
            runningPauseStart = Date.now();
            btn.textContent       = 'Pause beenden';
            btn.className         = 'btn-pause-stop';
            display.style.display = 'inline-flex';
            const now = new Date(runningPauseStart);
            dom.runningPauseStartLabel.textContent =
                `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
        } else {
            const durationMin   = Math.round((Date.now() - runningPauseStart) / 60000);
            const now           = new Date();
            const endTotalMin   = now.getHours() * 60 + now.getMinutes();
            const startTotalMin = endTotalMin - durationMin;
            if (durationMin > 0) pauses.push({ startMin: startTotalMin, durationMin });
            runningPauseStart       = null;
            btn.textContent         = 'Pause starten';
            btn.className           = 'btn-pause-start';
            display.style.display   = 'none';
        }
        updateTracker();
    }

    function toggleAddPauseForm() {
        editingPauseIndex   = null;
        addPauseFormVisible = !addPauseFormVisible;
        dom.addPauseForm.style.display = addPauseFormVisible ? 'flex' : 'none';

        if (addPauseFormVisible) {
            dom.addPauseFormTitle.textContent  = 'Pause eintragen:';
            dom.addPauseConfirmBtn.textContent = 'Hinzufügen';
            const now = new Date();
            dom.pauseFromInput.value =
                `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
            dom.pauseToInput.value = '';
            dom.pauseToInput.focus();
        }
        updateTracker();
    }

    function editPause(index) {
        editingPauseIndex   = index;
        addPauseFormVisible = true;
        const p = pauses[index];
        dom.addPauseForm.style.display    = 'flex';
        dom.addPauseFormTitle.textContent  = 'Pause bearbeiten:';
        dom.addPauseConfirmBtn.textContent = 'Speichern';
        dom.pauseFromInput.value = formatMinutesToTime(p.startMin);
        dom.pauseToInput.value   = formatMinutesToTime(p.startMin + p.durationMin);
        dom.pauseFromInput.focus();
        updateTracker();
    }

    /** Liest die aktuell im Formular stehende (noch nicht gespeicherte) Pause, sofern gültig */
    function getDraftPause() {
        if (!addPauseFormVisible) return null;
        const from = dom.pauseFromInput.value;
        const to   = dom.pauseToInput.value;
        if (!from || !to) return null;

        const fromMin = parseTimeToMinutes(from);
        let   toMin   = parseTimeToMinutes(to);
        if (toMin <= fromMin) toMin += 1440;

        const durationMin = toMin - fromMin;
        if (durationMin <= 0) return null;
        return { startMin: fromMin, durationMin };
    }

    /**
     * Pausenliste inkl. der gerade im Formular eingegebenen Pause, damit Werte und Grafiken schon
     * während der Eingabe/Bearbeitung live aktualisiert werden, bevor bestätigt wird.
     */
    function getEffectivePauses() {
        const draft = getDraftPause();
        if (!draft) return pauses;

        if (editingPauseIndex !== null) {
            return pauses.map((p, i) => i === editingPauseIndex ? { ...draft, isDraft: true } : p);
        }
        return [...pauses, { ...draft, isDraft: true }];
    }

    function addPauseFromForm() {
        const from = dom.pauseFromInput.value;
        const to   = dom.pauseToInput.value;
        if (!from || !to) { alert('Bitte Von- und Bis-Uhrzeit eingeben.'); return; }

        const fromMin = parseTimeToMinutes(from);
        let   toMin   = parseTimeToMinutes(to);
        if (toMin <= fromMin) toMin += 1440;

        const durationMin = toMin - fromMin;
        if (durationMin <= 0) { alert('Die Endzeit muss nach der Startzeit liegen.'); return; }

        if (findOverlappingPauseIndex(fromMin, toMin, editingPauseIndex) !== -1) {
            alert('Diese Pause überschneidet sich mit einer bereits eingetragenen Pause.');
            return;
        }

        if (editingPauseIndex !== null) {
            pauses[editingPauseIndex] = { startMin: fromMin, durationMin };
            editingPauseIndex = null;
        } else {
            pauses.push({ startMin: fromMin, durationMin });
        }
        addPauseFormVisible = false;
        dom.addPauseForm.style.display = 'none';
        updateTracker();
    }

    function deletePause(index) {
        if (editingPauseIndex === index) {
            addPauseFormVisible = false;
            editingPauseIndex   = null;
            dom.addPauseForm.style.display = 'none';
        }
        pauses.splice(index, 1);
        updateTracker();
    }

    // ── PAUSENLISTE RENDERN ───────────────────────────────────────────────
    function renderPauseList(currentMinOfDay, pausesList, runningPauseMin) {
        const list  = dom.pauseList;
        const items = [];

        pausesList.forEach((p, i) => {
            const endMin   = p.startMin + p.durationMin;
            const startStr = formatMinutesToTime(p.startMin);
            const endStr   = formatMinutesToTime(endMin);
            const isFuture = p.startMin > currentMinOfDay;
            const cls      = p.isDraft ? 'pause-future' : (isFuture ? 'pause-future' : 'pause-done');
            const tag      = p.isDraft ? ' <em>(Entwurf)</em>' : (isFuture ? ' <em>(geplant)</em>' : '');

            const actions = p.isDraft
                ? ''
                : ` <button class="pause-edit-btn" onclick="editPause(${i})" title="Bearbeiten">✎</button>`
                + ` <button class="pause-delete-btn" onclick="deletePause(${i})" title="Entfernen">×</button>`;

            items.push(
                `<span class="pause-item ${cls}">`
                + `${startStr}–${endStr} · ${p.durationMin} min${tag}`
                + actions
                + `</span>`
            );
        });

        if (runningPauseStart !== null) {
            items.push(`<span class="pause-item pause-running"><span class="running-dot"></span> Läuft (${runningPauseMin} min)</span>`);
        }

        list.innerHTML = items.length > 0
            ? `<div class="pause-items-list">${items.join('')}</div>`
            : '';
    }

    // ── WARNUNGEN ─────────────────────────────────────────────────────────
    function renderWarnings(netWorkMin, elapsedPauseMin) {
        const container = dom.legalWarnings;
        const warnings  = [];

        if (netWorkMin > 360 && elapsedPauseMin < 30) {
            const missing = Math.ceil(30 - elapsedPauseMin);
            warnings.push(`&#9888; Bei über 6h Arbeitszeit sind mindestens 30 min Pause vorgeschrieben. Es fehlen noch <strong>${missing} min</strong>.`);
        }
        if (netWorkMin > 570 && elapsedPauseMin < 45) {
            const missing = Math.ceil(45 - elapsedPauseMin);
            warnings.push(`&#9888; Bei über 9h30 Arbeitszeit sind mindestens 45 min Pause vorgeschrieben. Es fehlen noch <strong>${missing} min</strong>.`);
        }
        if (netWorkMin > 600) {
            warnings.push(`&#9888; Die gesetzliche Höchstarbeitszeit von 10h pro Tag ist überschritten.`);
        }

        container.innerHTML = warnings
            .map(w => `<div class="warning-banner">${w}</div>`)
            .join('');
    }

    // ── ZIELZEIT-BERECHNUNG ──────────────────────────────────────────────
    // Pausen, die zeitlich VOR bzw. WÄHREND der errechneten Zielzeit liegen, verschieben diese nach
    // hinten. Pausen, die erst NACH der Zielzeit beginnen, dürfen sie nicht beeinflussen.

    /** Pausen (inkl. laufender Pause) als {start,end}-Intervalle für die Zielzeit-/Warnschwellen-Berechnung */
    function buildPauseIntervals(currentMinOfDay, pausesList) {
        const intervals = pausesList.map(p => ({ start: p.startMin, end: p.startMin + p.durationMin }));
        if (runningPauseStart !== null) {
            const runStart    = new Date(runningPauseStart);
            const runStartMin = runStart.getHours() * 60 + runStart.getMinutes();
            intervals.push({ start: runStartMin, end: currentMinOfDay });
        }
        return intervals;
    }

    /** Schneidet Intervalle auf >= startMin zu, sortiert und verschmilzt Überlappungen */
    function mergePauseIntervals(pauseIntervals, startMin) {
        const clipped = pauseIntervals
            .map(iv => ({ start: Math.max(iv.start, startMin), end: iv.end }))
            .filter(iv => iv.end > iv.start)
            .sort((a, b) => a.start - b.start);

        const merged = [];
        clipped.forEach(iv => {
            const last = merged[merged.length - 1];
            if (last && iv.start <= last.end) {
                last.end = Math.max(last.end, iv.end);
            } else {
                merged.push({ ...iv });
            }
        });
        return merged;
    }

    /**
     * Uhrzeit (Minuten ab Mitternacht), zu der ab startMin insgesamt netMinutesNeeded Netto-Arbeitsminuten
     * erreicht sind. Pausen, die dabei durchlaufen werden, verlängern die Uhrzeit; Pausen, die erst nach
     * diesem Zeitpunkt beginnen, bleiben unberücksichtigt.
     */
    function computeClockTimeForNetMinutes(startMin, netMinutesNeeded, pauseIntervals) {
        const merged = mergePauseIntervals(pauseIntervals, startMin);
        let cursor    = startMin;
        let remaining = netMinutesNeeded;

        for (const iv of merged) {
            const availableBeforePause = iv.start - cursor;
            if (availableBeforePause >= remaining) return cursor + remaining;
            remaining -= availableBeforePause;
            cursor = iv.end;
        }
        return cursor + remaining;
    }

    // ── HAUPT-UPDATE ──────────────────────────────────────────────────────
    function updateTracker() {
        const now             = new Date();
        const currentMinOfDay = now.getHours() * 60 + now.getMinutes();

        const startMin      = parseTimeToMinutes(startTimeInput.value);
        const targetWorkMin = parseDuration(dailyTimeInput.value); // Netto-Ziel

        // Pausenliste inkl. eines gerade im Formular eingegebenen Entwurfs (Live-Vorschau)
        const effectivePauses = getEffectivePauses();

        // Vergangene Zeit seit Arbeitsbeginn (Uhr-Minuten)
        let elapsedMin = currentMinOfDay - startMin;
        if (elapsedMin < -120) elapsedMin += 1440;
        if (elapsedMin < 0)    elapsedMin = 0;

        // Vergangene Pausenminuten
        let elapsedPauseMin = 0;
        effectivePauses.forEach(p => {
            const pEnd = p.startMin + p.durationMin;
            if (currentMinOfDay >= pEnd) {
                elapsedPauseMin += p.durationMin;
            } else if (currentMinOfDay > p.startMin) {
                elapsedPauseMin += currentMinOfDay - p.startMin;
            }
        });

        let runningPauseMin = 0;
        if (runningPauseStart !== null) {
            // Auf Basis von currentMinOfDay (volle Minuten) statt Date.now()-Differenz berechnen,
            // damit runningPauseMin exakt im selben Minutentakt wächst wie elapsedMin. Sonst driftet
            // netWorkMin während der laufenden Pause innerhalb jeder Minute kurz nach unten/oben.
            const runStart    = new Date(runningPauseStart);
            const runStartMin = runStart.getHours() * 60 + runStart.getMinutes();
            runningPauseMin   = Math.max(0, currentMinOfDay - runStartMin);
            elapsedPauseMin  += runningPauseMin;
            dom.runningPauseDuration.textContent = runningPauseMin;
        }

        const netWorkMin     = Math.max(0, elapsedMin - elapsedPauseMin);
        const allPauseMin    = effectivePauses.reduce((s, p) => s + p.durationMin, 0) + runningPauseMin;
        const pauseIntervals = buildPauseIntervals(currentMinOfDay, effectivePauses);

        // Stat-Cards befüllen
        dom.statNetWork.textContent = formatDuration(netWorkMin) + ' h';
        dom.statNetWork.className   = 'stat-value';

        dom.statPauseTotal.textContent = formatDuration(allPauseMin) + ' h';
        dom.statPauseTotal.className   = 'stat-value muted';

        const hasTarget = targetWorkMin > 0 && !!startTimeInput.value;
        let targetEndMin = null;

        if (hasTarget) {
            targetEndMin            = computeClockTimeForNetMinutes(startMin, targetWorkMin, pauseIntervals);
            const remaining         = netWorkMin - targetWorkMin;
            const progressUncapped  = Math.max(0, (netWorkMin / targetWorkMin) * 100);
            const progressCapped    = Math.min(100, progressUncapped);

            dom.statTargetTime.textContent = formatMinutesToTime(targetEndMin);
            dom.statTargetTime.className   = 'stat-value';

            dom.statDiff.textContent = formatDifference(remaining);
            dom.statDiff.className   = 'stat-value ' + (remaining >= 0 ? 'pos' : 'neg');

            dom.statProgress.textContent = `${progressUncapped.toFixed(1)} %`;
            dom.statProgress.className   = 'stat-value';
            dom.statProgressBar.style.width = `${progressCapped}%`;

            updateTitle({ hasTarget, netWorkMin, allPauseMin, targetEndMin, remaining, progressUncapped });
        } else {
            dom.statTargetTime.textContent = '–';
            dom.statTargetTime.className   = 'stat-value muted';
            dom.statDiff.textContent       = '–';
            dom.statDiff.className         = 'stat-value muted';
            dom.statProgress.textContent   = '–';
            dom.statProgress.className     = 'stat-value muted';
            dom.statProgressBar.style.width = '0%';
            updateTitle({ hasTarget, netWorkMin, allPauseMin });
        }

        // Warnschwellen (6h/9h30/10h) als Uhrzeit-Marker für den Zeitstrahl, mit Bezug zum "Jetzt"-Zeiger
        const warnMarkers = [
            { thresholdMin: 360, label: '6h',   active: netWorkMin > 360 && elapsedPauseMin < 30 },
            { thresholdMin: 570, label: '9h30', active: netWorkMin > 570 && elapsedPauseMin < 45 },
            { thresholdMin: 600, label: '10h',  active: netWorkMin > 600 }
        ].map(w => ({
            clockMin: computeClockTimeForNetMinutes(startMin, w.thresholdMin, pauseIntervals),
            label:    w.label,
            active:   w.active
        }));

        renderPauseList(currentMinOfDay, effectivePauses, runningPauseMin);
        renderWarnings(netWorkMin, elapsedPauseMin);
        drawTimeline(elapsedMin, startMin, currentMinOfDay, runningPauseMin, targetEndMin, warnMarkers, effectivePauses);
        updateUrlParams();

        dom.lastUpdate.textContent =
            `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
    }

    // ── TIMELINE ──────────────────────────────────────────────────────────
    function drawTimeline(elapsedMin, startMinOfDay, currentMinOfDay, runningPauseMin, targetEndMin, warnMarkers, pausesList) {
        const width        = svg.clientWidth || 940;
        const paddingLeft  = 30;
        const paddingRight = 30;
        const chartWidth   = width - paddingLeft - paddingRight;
        const barY         = 40;
        const barHeight    = 24;

        function getX(minutes) {
            return paddingLeft + (Math.min(Math.max(minutes, 0), maxTimelineDuration) / maxTimelineDuration) * chartWidth;
        }

        svg.innerHTML = '';

        // 1. Hintergrundbalken
        svg.appendChild(svgEl('rect', { x: paddingLeft, y: barY, width: chartWidth, height: barHeight, fill: '#edf2f7', rx: 4 }));

        // 2. Grüner Fortschrittsbalken (verstrichene Uhr-Zeit)
        const elapsedX = getX(elapsedMin);
        if (elapsedX > paddingLeft) {
            svg.appendChild(svgEl('rect', {
                x: paddingLeft, y: barY + 2,
                width: Math.min(elapsedX - paddingLeft, chartWidth),
                height: barHeight - 4,
                fill: '#48bb78', opacity: 0.85, rx: 2
            }));
        }

        // 3. Pausenblöcke
        pausesList.forEach(p => {
            const offsetMin = p.startMin - startMinOfDay;
            if (offsetMin > maxTimelineDuration || offsetMin + p.durationMin < 0) return;
            const pX1      = getX(Math.max(0, offsetMin));
            const pX2      = getX(offsetMin + p.durationMin);
            const isFuture = p.startMin > currentMinOfDay;
            svg.appendChild(svgEl('rect', {
                x: pX1, y: barY,
                width: Math.max(0, pX2 - pX1), height: barHeight,
                fill: p.isDraft ? 'rgba(221,107,32,0.35)' : (isFuture ? 'rgba(49,130,206,0.22)' : 'rgba(113,128,150,0.5)')
            }));
        });

        // Laufende Pause
        if (runningPauseStart !== null && runningPauseMin > 0) {
            const runStart    = new Date(runningPauseStart);
            const runStartMin = runStart.getHours() * 60 + runStart.getMinutes();
            const offsetMin   = runStartMin - startMinOfDay;
            if (offsetMin >= 0) {
                svg.appendChild(svgEl('rect', {
                    x: getX(offsetMin), y: barY,
                    width: Math.max(0, getX(offsetMin + runningPauseMin) - getX(offsetMin)),
                    height: barHeight, fill: 'rgba(56,161,105,0.4)'
                }));
            }
        }

        // 4. X-Achse
        const maxHours = Math.floor(maxTimelineDuration / 60);
        for (let h = 0; h <= maxHours; h++) {
            const tX  = getX(h * 60);
            svg.appendChild(svgEl('line', { x1: tX, y1: barY - 5, x2: tX, y2: barY, stroke: '#cbd5e0', 'stroke-width': 1.5 }));
            const txt = svgEl('text', { x: tX, y: barY - 9, 'text-anchor': 'middle', 'font-size': '11px', fill: '#718096', 'font-weight': 500 });
            txt.textContent = `${h}h`;
            svg.appendChild(txt);
        }

        // 5. Zielmarker (nur wenn Tagesziel eingegeben)
        if (targetEndMin !== null && startMinOfDay > 0) {
            const offsetMin = targetEndMin - startMinOfDay;
            const mX        = getX(offsetMin);
            const labelTime = formatMinutesToTime(targetEndMin);
            const fullText  = `Tagesziel (${labelTime})`;
            const levelY    = barY + barHeight + 20;

            svg.appendChild(svgEl('line', { x1: mX, y1: barY - 2, x2: mX, y2: levelY - 8, stroke: '#e53e3e', 'stroke-width': 2, 'stroke-dasharray': '3,2' }));
            svg.appendChild(svgEl('circle', { cx: mX, cy: levelY - 9, r: 3, fill: '#e53e3e' }));

            const approxW = fullText.length * 6 + 10;
            const bgRect  = svgEl('rect', { x: mX - approxW / 2, y: levelY - 8, width: approxW, height: 14, class: 'label-bg' });
            svg.appendChild(bgRect);

            const lTxt = svgEl('text', { x: mX, y: levelY + 3, 'text-anchor': 'middle', 'font-size': '11px', 'font-weight': 600, fill: '#c53030' });
            lTxt.textContent = fullText;
            svg.appendChild(lTxt);
        }

        // 6. Warnschwellen-Marker (zeigen, wann eine Pausen-Warnung entsteht – Bezug zum „Jetzt"-Zeiger)
        if (startMinOfDay > 0 && warnMarkers) {
            warnMarkers.forEach(w => {
                const offsetMin = w.clockMin - startMinOfDay;
                if (offsetMin < 0 || offsetMin > maxTimelineDuration) return;
                const wX    = getX(offsetMin);
                const color = w.active ? '#dd6b20' : '#cbd5e0';

                svg.appendChild(svgEl('line', {
                    x1: wX, y1: barY - 11, x2: wX, y2: barY,
                    stroke: color, 'stroke-width': w.active ? 2 : 1.5,
                    'stroke-dasharray': w.active ? '0' : '2,2'
                }));
                svg.appendChild(svgEl('circle', { cx: wX, cy: barY - 11, r: 2.5, fill: color }));

                const wTxt = svgEl('text', {
                    x: wX, y: barY - 15, 'text-anchor': 'middle', 'font-size': '9px',
                    'font-weight': w.active ? 700 : 500, fill: color
                });
                wTxt.textContent = w.label;
                svg.appendChild(wTxt);
            });
        }

        // 7. „Jetzt"-Marker
        if (elapsedMin >= 0 && elapsedMin <= maxTimelineDuration && startMinOfDay > 0) {
            const nowX       = getX(elapsedMin);
            const nowTimeStr = formatMinutesToTime(startMinOfDay + elapsedMin);

            svg.appendChild(svgEl('line', { x1: nowX, y1: barY - 12, x2: nowX, y2: barY + barHeight + 8, stroke: '#3182ce', 'stroke-width': 2.5 }));

            svg.appendChild(svgEl('rect', { x: nowX - 36, y: barY - 26, width: 72, height: 14, fill: '#3182ce', rx: 4 }));

            const nowTxt = svgEl('text', { x: nowX, y: barY - 16, 'text-anchor': 'middle', 'font-size': '10px', 'font-weight': 'bold', fill: '#ffffff' });
            nowTxt.textContent = `Jetzt: ${nowTimeStr}`;
            svg.appendChild(nowTxt);
        }
    }

    // ── HILFSFUNKTIONEN ───────────────────────────────────────────────────

    /** Erstellt ein SVG-Element mit Attributen */
    function svgEl(tag, attrs) {
        const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
        for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, v);
        return el;
    }

    /** "H:MM" oder "HH:MM" Dauer → Minuten (kein Bezug auf Uhrzeit) */
    function parseDuration(str) {
        if (!str || !str.trim()) return 0;
        str = str.trim().replace(',', '.');
        if (str.includes(':')) {
            const [h, m] = str.split(':').map(s => parseInt(s, 10) || 0);
            return h * 60 + m;
        }
        // Reine Zahl → als Stunden interpretieren
        const hours = parseFloat(str);
        return isNaN(hours) ? 0 : Math.round(hours * 60);
    }

    /** Minuten → "H:MM" Dauer-String */
    function formatDuration(totalMin) {
        totalMin = Math.round(totalMin);
        const h = Math.floor(totalMin / 60);
        const m = totalMin % 60;
        return `${h}:${String(m).padStart(2, '0')}`;
    }

    /** "HH:MM" Uhrzeit → Minuten ab Mitternacht */
    function parseTimeToMinutes(timeStr) {
        if (!timeStr) return 0;
        const [h, m] = timeStr.split(':').map(Number);
        if (Number.isNaN(h) || Number.isNaN(m)) return 0;
        return h * 60 + m;
    }

    /** Minuten ab Mitternacht → "HH:MM" Uhrzeit (mit 24h-Wrap) */
    function formatMinutesToTime(totalMin) {
        const norm = (Math.round(totalMin) % 1440 + 1440) % 1440;
        return `${String(Math.floor(norm / 60)).padStart(2, '0')}:${String(norm % 60).padStart(2, '0')}`;
    }

    /** Differenz in Minuten → "+H:MM" oder "-H:MM" */
    function formatDifference(diffMin) {
        const sign = diffMin >= 0 ? '+' : '-';
        const abs  = Math.abs(diffMin);
        return `${sign}${Math.floor(abs / 60)}:${String(Math.floor(abs % 60)).padStart(2, '0')}`;
    }
</script>
