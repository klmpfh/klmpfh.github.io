<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Zeigt ein zufälliges Spotify-Album aus einer kuratierten Liste.">
    <title>??? Album</title>
    <link rel="icon" href="../assets/img/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="../assets/css/reset.css">
    <link rel="stylesheet" href="../assets/css/theme.css">
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: calc(var(--theme-nav-height) + 20px) 16px 20px;
            text-align: center;
        }

        .container {
            max-width: 600px;
            width: 100%;
            padding: 24px;
            border: 1px solid var(--theme-border);
            border-radius: var(--theme-radius-lg);
            background-color: var(--theme-surface);
            box-shadow: var(--theme-shadow);
        }

        #result {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .spotify-link {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background-color: var(--theme-accent);
            color: #fff;
            font-size: 1.1rem;
            font-weight: bold;
            text-decoration: none;
            padding: 14px 28px;
            border-radius: 50px;
            margin-top: 16px;
            transition: background-color 0.2s, transform 0.1s;
        }

        .spotify-link:hover {
            background-color: var(--theme-accent-strong);
            transform: scale(1.04);
        }

        .spotify-logo {
            width: 28px;
            height: 28px;
        }

        .new-album-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: var(--theme-accent);
            color: #fff;
            font-size: 0.95rem;
            font-weight: bold;
            border: none;
            cursor: pointer;
            padding: 12px 28px;
            border-radius: 50px;
            margin-top: 12px;
            transition: background-color 0.2s, transform 0.1s;
        }

        .new-album-btn:hover {
            background-color: var(--theme-accent-strong);
            transform: scale(1.04);
        }

        .update-note {
            margin-top: 14px;
            font-size: 0.75rem;
            opacity: 0.5;
        }
    </style>
</head>

        </svg>`;

        function formatDuration(min, approx) {
            const h = Math.floor(min / 60);
            const m = min % 60;
            const text = h > 0 ? `${h} Std. ${m} Min.` : `${m} Min.`;
            return (approx ? '≈ ' : '') + text;
        }

        function showRandomAlbum() {
            // Zufälligen Index wählen
            const randomIndex = Math.floor(Math.random() * albumLinks.length);
            const selectedAlbum = albumLinks[randomIndex];

            // Embed-URL → Album-ID → direkter Spotify-Link
            const albumId = selectedAlbum.url.split('/album/')[1];
            const spotifyUrl = `https://open.spotify.com/album/${albumId}`;
            const durationText = formatDuration(selectedAlbum.min, selectedAlbum.approx);

            // Albumtitel und Coverbild über oEmbed laden
            fetch(`https://open.spotify.com/oembed?url=${spotifyUrl}`)
                .then(r => r.json())
                .then(data => {
                    resultDiv.innerHTML = `
                        <img src="${data.thumbnail_url}" alt="${data.title}" style="width:220px;height:220px;border-radius:10px;object-fit:cover;margin-bottom:14px;box-shadow:0 4px 20px rgba(0,0,0,0.5);">
                        <p style="margin:0 0 4px;font-size:1rem;font-weight:bold;">${data.title}</p>
                        <p style="margin:0 0 14px;font-size:0.85rem;opacity:0.7;">${durationText}</p>
                        <a class="spotify-link" href="${spotifyUrl}" target="_blank" rel="noopener">
                            ${spotifyLogoSvg}
                            In Spotify öffnen
                        </a>
                    `;
                })
                .catch(() => {
                    // Fallback ohne Bild/Titel
                    resultDiv.innerHTML = `
                        <p style="margin:0 0 14px;font-size:0.85rem;opacity:0.7;">${durationText}</p>
                        <a class="spotify-link" href="${spotifyUrl}" target="_blank" rel="noopener">
                            ${spotifyLogoSvg}
                            In Spotify öffnen
                        </a>
                    `;
                });
        }

        newAlbumBtn.addEventListener('click', showRandomAlbum);
        showRandomAlbum();
