<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zaubern &amp; Kloppen – Szenario-Generator</title>
    <style>
        * {
            font-family: 'Courier New', Courier, monospace;
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #1a1510;
            color: #c0a87a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        h1 {
            color: #c8a84e;
            font-size: 1.6rem;
            margin-bottom: 6px;
            text-align: center;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        .subtitle {
            color: #7a6040;
            font-size: 0.85rem;
            margin-bottom: 30px;
            text-align: center;
            letter-spacing: 2px;
        }

        .container {
            max-width: 600px;
            width: 100%;
            padding: 28px;
            border: 2px solid #5c4230;
            border-radius: 10px;
            background-color: #221910;
            box-shadow: 0 0 24px rgba(180, 120, 40, 0.12);
        }

        .scenario {
            font-size: 1.15rem;
            line-height: 2.2;
            text-align: center;
            margin-bottom: 28px;
        }

        .scenario .label {
            color: #7a6040;
            font-size: 0.75rem;
            display: block;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 12px;
        }

        .scenario .value {
            color: #d4b870;
            font-weight: bold;
            font-size: 1.2rem;
            display: block;
        }

        .dice {
            font-size: 0.75rem;
            color: #5c4230;
            letter-spacing: 2px;
        }

        .btn {
            display: block;
            width: 100%;
            background-color: #4a2e18;
            color: #c8b08a;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            padding: 14px 0;
            border-radius: 6px;
            cursor: pointer;
            letter-spacing: 3px;
            text-transform: uppercase;
            transition: background-color 0.15s;
        }

        .btn:hover {
            background-color: #5c3a20;
        }

        .btn:active {
            background-color: #3a2010;
        }

        .separator {
            border: none;
            border-top: 1px solid #3a2810;
            margin: 16px 0;
        }
    </style>
</head>

<body>
    <h1>Zaubern &amp; Kloppen</h1>
    <p class="subtitle">Szenario-Generator</p>

    <div class="container">
        <div class="scenario" id="scenario"></div>
        <hr class="separator">
        <button class="btn" onclick="roll()">&#9654; Neu würfeln</button>
    </div>

    <script>
        const threats = [
            "Morgath, der erwachte Lichkönig",
            "eine endlose Horde hungriger Trolle und Orks",
            "eine verräterische Erzmagierin auf Rachefeldzug",
            "Schalakhor, uralter Drache der Verderbnis",
            "ein Schwarm seelenfressender Dämonen",
            "Medushara, Anführerin der Schlangenmensch-Sekte",
            "die Inquisition des Heiligen Sonnenordens",
            "der ewige Dschinn Azarak der Ungebundene",
            "Elfenassassinen aus dem verbotenen Wald",
            "die dunkle Bruderschaft des Abyssus",
            "Fürst Valdrak und sein untotes Heer",
            "die unsterbliche Herrin der Leere, Nyxara"
        ];

        const wants = [
            "auslöschen und verfluchen",
            "rauben und entführen",
            "sich vereinen mit / aufgehen in",
            "unter finstere Herrschaft stellen",
            "aus verbotener Magie erschaffen",
            "unterwerfen und versklaven",
            "erwecken / entfesseln",
            "in Doppelgänger verwandeln",
            "sabotieren / unterwandern",
            "verbannen / für immer versiegeln",
            "verzaubern / korrumpieren",
            "beherrschen / geistig manipulieren"
        ];

        const targets = [
            "die Königin der Grenzdörfer",
            "uralte Dracheneier im Herzwald",
            "die mächtige Festung Eisentor",
            "einen instabilen Magiestrudel im Gebirge",
            "eine vergessene Tempelruine im Sumpf",
            "ein rätselhaftes arkanes Artefakt",
            "die letzte Elbenkönigin des Silberwaldes",
            "den Gedächtnisstein der alten Götter",
            "die sterbende Welteneiche",
            "die prophetische Hexe Seraphira",
            "den Knotenpunkt aller Ley-Linien",
            "die eingefrorene Zeit selbst"
        ];

        const consequences = [
            "ein ganzes Königreich in Asche legen wird",
            "den Lauf der Zeit umkehren wird",
            "alle Stadtbewohner in Untote verwandeln wird",
            "einen Götterkrieg entfachen wird",
            "das Gewebe der Magie für immer zerreißen wird",
            "auf wundersame Weise alle Wunden heilen wird",
            "eine neue Welt aus den Trümmern erschaffen wird",
            "alle Lebewesen in Stein verwandeln wird",
            "eine neue dominierende Rasse beschwören wird",
            "den Tod selbst aufheben wird",
            "alle Erinnerungen der Sterblichen löschen wird",
            "zwei mächtige Reiche in den Untergang reißen wird"
        ];

        function d12() {
            return Math.floor(Math.random() * 12);
        }

        function roll() {
            const t = d12(), w = d12(), g = d12(), k = d12();

            document.getElementById('scenario').innerHTML = `
                <span class="label">Bedrohung</span>
                <span class="value">${threats[t]}</span>

                <span class="label">will</span>
                <span class="value">${wants[w]}</span>

                <span class="label">…</span>
                <span class="value">${targets[g]}</span>

                <span class="label">was</span>
                <span class="value">${consequences[k]}</span>

                <span class="dice" style="margin-top:18px;">
                    [W12: ${(t+1).toString().padStart(2,'0')}] [W12: ${(w+1).toString().padStart(2,'0')}] [W12: ${(g+1).toString().padStart(2,'0')}] [W12: ${(k+1).toString().padStart(2,'0')}]
                </span>
            `;
        }

        roll();
    </script>
</body>

</html>
